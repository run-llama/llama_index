[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llama-index-readers-azure-tax-forms"
version = "0.1.0"
description = "LlamaIndex reader for IRS tax form extraction via Azure Document Intelligence"
authors = [{ name = "Ambreen Zaver", email = "zaver.ambreen@gmail.com" }]
requires-python = ">=3.10,<4.0"
readme = "README.md"
license = "MIT"
keywords = [
    "llama-index",
    "azure",
    "document-intelligence",
    "tax-forms",
    "1040",
    "w2",
    "ocr",
    "rag",
    "fafsa",
    "financial-aid",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "llama-index-core>=0.10.0,<1.0",
    "azure-ai-formrecognizer>=3.3.0",
    "pypdf>=3.0.0",
    "Pillow>=10.0.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[tool.hatch.build.targets.sdist]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.hatch.build.targets.wheel]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.llamahub]
contains_example = false
import_path = "llama_index.readers.azure_tax_forms"

[tool.llamahub.class_authors]
AzureTaxFormReader = "zavera"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"
