[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "llama-index-readers-linear"
version = "0.1.0"
description = "LlamaIndex reader for Linear issues via the Linear GraphQL API."
authors = ["chitlapally.ganesh16@gmail.com"]
license = "MIT"
readme = "README.md"
packages = [{ include = "llama_index_readers_linear" }]

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
llama-index-core = ">=0.10.0"
requests = ">=2.28.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0"
pytest-mock = ">=3.10"
responses = ">=0.23"
black = ">=23.0"
ruff = ">=0.1"

[tool.pytest.ini_options]
testpaths = ["tests"]