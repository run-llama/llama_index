[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ipython>=8.0.0",
    "jupyter>=1.0.0,<2",
    "mypy>=1.0",
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.0",
    "ruff>=0.0.270",
    "black>=23.0",
]

[project]
name = "llama-index-readers-salesforce-npsp"
version = "0.1.0"
description = "LlamaIndex data reader for Salesforce Nonprofit Success Pack (NPSP). Ingests donor records, gift histories, and engagement metrics as structured LLM-ready Documents."
authors = [{name = "Shivam Lalakiya", email = "Shivamlalakiya151299@gmail.com"}]
requires-python = ">=3.10,<4.0"
readme = "README.md"
license = "MIT"
dependencies = [
    "llama-index-core>=0.13.0,<0.15",
    "simple-salesforce>=1.12.5",
    "griffe>=0.40,<2",
]

[tool.codespell]
check-filenames = true
check-hidden = true
skip = "*.csv,*.html,*.json,*.jsonl,*.pdf,*.txt,*.ipynb"

[tool.hatch.build.targets.sdist]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.hatch.build.targets.wheel]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.llamahub]
contains_example = true
import_path = "llama_index.readers.salesforce_npsp"

[tool.llamahub.class_authors]
SalesforceNPSPReader = "shivamlalakiya"

[tool.mypy]
disallow_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
mypy_path = "."

[tool.ruff]
target-version = "py39"
line-length = 88
