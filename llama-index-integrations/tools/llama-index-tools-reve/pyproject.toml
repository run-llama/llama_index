[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest==7.2.1",
    "pytest-mock==3.11.1",
    "pytest-asyncio>=0.23.8",
    "pytest-cov>=6.1.1",
    "ruff==0.11.11",
    "mypy==0.991",
    "respx>=0.22.0",
]

[project]
name = "llama-index-tools-reve"
version = "0.1.0"
description = "llama-index tools reve AI image generation integration"
authors = [{name = "LlamaIndex Community"}]
requires-python = ">=3.10,<4.0"
readme = "README.md"
license = "MIT"
keywords = [
    "reve",
    "image-generation",
    "mcp",
    "tools",
]
dependencies = [
    "httpx>=0.27.0",
    "llama-index-core>=0.13.0,<0.15",
    "mcp>=1.9.1,<2",
]

[project.optional-dependencies]
mcp-server = [
    "mcp>=1.9.1,<2",
]

[tool.codespell]
check-filenames = true
check-hidden = true
skip = "*.csv,*.html,*.json,*.jsonl,*.pdf,*.txt,*.ipynb"

[tool.hatch.build.targets.sdist]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.hatch.build.targets.wheel]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.llamahub]
contains_example = false
import_path = "llama_index.tools.reve"

[tool.llamahub.class_authors]
ReveToolSpec = "morongosteve"

[tool.mypy]
disallow_untyped_defs = true
exclude = ["_static", "build", "examples", "notebooks", "venv"]
ignore_missing_imports = true
python_version = "3.10"
