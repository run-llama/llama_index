[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ipython==8.10.0",
    "jupyter>=1.0.0,<2",
    "mypy==0.991",
    "pre-commit==3.2.0",
    "pylint==2.15.10",
    "pytest==9.0.3",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=6.1.1",
    "pytest-mock==3.11.1",
    "ruff==0.11.11",
]

[project]
name = "llama-index-tools-ejentum"
version = "0.1.0"
description = "Ejentum Reasoning Harness MCP server as a LlamaIndex tool spec"
authors = [{name = "Ejentum", email = "info@ejentum.com"}]
readme = "README.md"
license = "MIT"
requires-python = ">=3.10,<4.0"
keywords = [
    "mcp",
    "reasoning",
    "anti-deception",
    "cognitive-harness",
    "agent",
    "model-context-protocol",
]
dependencies = [
    "llama-index-core>=0.13.0,<0.15",
    "llama-index-tools-mcp>=0.4.1,<0.5",
]

[tool.codespell]
check-filenames = true
check-hidden = true
skip = "*.csv,*.html,*.json,*.jsonl,*.pdf,*.txt,*.ipynb"

[tool.hatch.build.targets.sdist]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.hatch.build.targets.wheel]
include = ["llama_index/"]
exclude = ["**/BUILD"]

[tool.llamahub]
contains_example = true
import_path = "llama_index.tools.ejentum"

[tool.llamahub.class_authors]
EjentumToolSpec = "ejentum"
